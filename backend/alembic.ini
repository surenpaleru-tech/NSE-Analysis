# Alembic Configuration

[alembic]
script_location = alembic
prepend_sys_path = .
#sqlalchemy.url = postgresql+psycopg2://nse_admin:change_me_in_production@localhost:5432/nse_intelligence
sqlalchemy.url = postgresql+asyncpg://nse_admin:change_me_in_production@postgres:5432/nse_intelligence

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
